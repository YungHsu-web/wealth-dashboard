<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永旭全球 - 客戶資產健診系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        body { background-color: #f4f4f2; font-family: "Microsoft JhengHei", sans-serif; color: #4a4a4a; }
        .gold-border { border-top: 4px solid #bda391; }
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .dot-green { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; } 
        .dot-yellow { background-color: #eab308; box-shadow: 0 0 8px #eab308; } 
        .dot-red { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        .task-step { flex: 1; text-align: center; padding: 8px; border-bottom: 3px solid #e5e7eb; color: #9ca3af; font-size: 0.8rem; font-weight: bold; }
        .task-step.active { color: #bda391; border-bottom-color: #bda391; background: #fdfbf7; }
        .detail-row { display: none; background-color: #fafaf9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm gold-border">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">永旭全球 (YongHsu Global)</h1>
                <p id="update-time" class="text-slate-500 text-sm mt-1">數據載入中...</p>
            </div>
            <span class="hidden md:block text-xs border border-[#bda391] text-[#bda391] px-4 py-1 rounded-full font-bold">家族辦公室 ‧ 智能追蹤系統</span>
        </header>

        <div id="kpi-container" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8"></div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-sm">
                    <tr>
                        <th class="p-4">客戶編號/姓名</th>
                        <th class="p-4">淨資產 (Net Worth)</th>
                        <th class="p-4">負債比</th>
                        <th class="p-4">健康燈號</th>
                        <th class="p-4">對接專家</th>
                    </tr>
                </thead>
                <tbody id="main-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function init() {
            google.script.run.withSuccessHandler(renderData).getFullData();
        }

        function renderData(data) {
            const tbody = document.getElementById('main-table-body');
            let totalAUM = 0, counts = { RED: 0, YELLOW: 0, GREEN: 0 };
            tbody.innerHTML = '';

            data.forEach((row, index) => {
                const liq = parseFloat(row.cash) + parseFloat(row.deposits);
                const inv = parseFloat(row.stock) + parseFloat(row.fund) + parseFloat(row.bond) + parseFloat(row.privateFund) + parseFloat(row.crypto);
                const fix = parseFloat(row.realEstate) + parseFloat(row.gold) + parseFloat(row.art);
                const ins = parseFloat(row.insurance);
                const totalAssets = liq + inv + fix + ins;
                const totalLiab = parseFloat(row.shortDebt) + parseFloat(row.longDebt);
                const netWorth = totalAssets - totalLiab;
                const debtRatio = totalAssets > 0 ? ((totalLiab / totalAssets) * 100).toFixed(1) : 0;
                
                totalAUM += netWorth;
                counts[row.status]++;

                const statusColor = row.status === 'RED' ? 'text-red-600' : (row.status === 'YELLOW' ? 'text-yellow-600' : 'text-green-600');
                const dotClass = `dot-${row.status.toLowerCase()}`;

                const rowHtml = `
                    <tr class="border-b cursor-pointer hover:bg-slate-50 transition" onclick="toggleDetail(${index})">
                        <td class="p-4 font-bold text-slate-700">${row.id} <span class="text-xs font-normal text-slate-400">(${row.name})</span></td>
                        <td class="p-4 font-bold text-[#bda391]">${netWorth.toLocaleString()} 萬</td>
                        <td class="p-4">${debtRatio}%</td>
                        <td class="p-4"><span class="status-dot ${dotClass}"></span><span class="${statusColor} font-bold">${row.status}</span></td>
                        <td class="p-4 text-sm font-bold text-slate-600">${row.expert}</td>
                    </tr>
                    <tr id="detail-${index}" class="detail-row">
                        <td colspan="5" class="p-6 bg-slate-50 border-b-2 border-[#bda391]">
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div class="bg-white p-5 rounded-lg shadow-sm">
                                    <h4 class="font-bold border-b pb-2 mb-4">🚩 年度追蹤任務</h4>
                                    <div class="flex mb-4">
                                        <div class="task-step ${row.currentQ === 'Q1' ? 'active' : ''}">Q1 啟動</div>
                                        <div class="task-step ${row.currentQ === 'Q2' ? 'active' : ''}">Q2 檢核</div>
                                        <div class="task-step ${row.currentQ === 'Q3' ? 'active' : ''}">Q3 平衡</div>
                                        <div class="task-step ${row.currentQ === 'Q4' ? 'active' : ''}">Q4 結算</div>
                                    </div>
                                    <div class="bg-slate-50 p-3 rounded text-sm text-slate-700">
                                        <strong>當前任務：</strong> ${row.task}
                                    </div>
                                </div>
                                <div class="bg-white p-5 rounded-lg shadow-sm">
                                    <h4 class="font-bold border-b pb-2 mb-2">📊 四大資產配置</h4>
                                    <canvas id="chart-${index}" height="150"></canvas>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += rowHtml;
                row._calc = { liq, inv, fix, ins };
            });

            // 更新 KPI
            updateKPI(totalAUM, counts);
            window.clientData = data;
        }

        function updateKPI(aum, c) {
            document.getElementById('kpi-container').innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-[#bda391]"><div class="text-xs font-bold text-slate-400">總管理淨資產 (AUM)</div><div class="text-2xl font-bold text-[#bda391]">${aum.toLocaleString()} 萬</div></div>
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-green-500"><div class="text-xs font-bold text-slate-400">健康</div><div class="text-2xl font-bold text-green-600">${c.GREEN}</div></div>
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-yellow-500"><div class="text-xs font-bold text-slate-400">關注</div><div class="text-2xl font-bold text-yellow-500">${c.YELLOW}</div></div>
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-red-500"><div class="text-xs font-bold text-slate-400">預警</div><div class="text-2xl font-bold text-red-500">${c.RED}</div></div>
            `;
            document.getElementById('update-time').innerText = '最後同步：' + new Date().toLocaleString();
        }

        function toggleDetail(index) {
            const el = document.getElementById(`detail-${index}`);
            const isVisible = el.style.display === 'table-row';
            document.querySelectorAll('.detail-row').forEach(r => r.style.display = 'none');
            if (!isVisible) {
                el.style.display = 'table-row';
                renderChart(index, window.clientData[index]._calc);
            }
        }

        function renderChart(idx, d) {
            const ctx = document.getElementById(`chart-${idx}`).getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['流動', '投資', '固定', '保障'],
                    datasets: [{ data: [d.liq, d.inv, d.fix, d.ins], backgroundColor: ['#9fb8ad', '#bda391', '#7a847a', '#d9c8b0'] }]
                },
                options: { plugins: { legend: { position: 'right' } } }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
