<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永續全球 - 動態管理儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: "Microsoft JhengHei", sans-serif; }
        .gold-border { border-top: 4px solid #b89150; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-xl shadow-md gold-border">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">永續全球 (Yongxu Global) 動態管理</h1>
                <p id="update-time" class="text-slate-500 text-sm">數據讀取中...</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center" id="kpi-container">
            </div>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">單一客戶資產配置分析</h2>
            <div class="flex flex-col md:flex-row items-center gap-6">
                <div class="w-full md:w-1/3">
                    <label for="client-select" class="block text-sm font-bold text-slate-700 mb-2">請選擇要檢視的客戶：</label>
                    <select id="client-select" class="w-full p-3 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#b89150] bg-slate-50 text-slate-800 text-lg">
                        <option value="">載入客戶名單中...</option>
                    </select>
                    <div id="client-info-card" class="mt-4 p-4 bg-slate-50 rounded-lg hidden border border-slate-100">
                        <p class="text-sm text-slate-600 font-bold mb-1">目前狀態：<span id="card-status"></span></p>
                        <p class="text-sm text-slate-600 font-bold mb-1">總資產規模：<span id="card-assets" class="text-[#b89150]"></span></p>
                        <p class="text-sm text-slate-600">專家：<span id="card-expert"></span></p>
                    </div>
                </div>
                <div class="w-full md:w-2/3 h-72">
                    <canvas id="individualAssetChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4">客戶編號</th>
                        <th class="p-4">資產規模</th>
                        <th class="p-4">狀態</th>
                        <th class="p-4">風險提醒</th>
                        <th class="p-4">對接專家</th>
                    </tr>
                </thead>
                <tbody id="client-table-body" class="text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 【請在此處替換成你剛剛在 Google 試算表取得的 CSV 網址】
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTV5NXcQxG8T3pFWlP-Dl6MUbSQT4Y5ILfsw3jMii0EmIKYdx73XkniDLss6_vVji5j8vcwhO3vYW05/pub?output=csv';

        let individualChartInstance = null; // 儲存圖表實例
        let globalClientData = []; // 儲存所有客戶資料

        function loadData() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    globalClientData = results.data.filter(row => row.客戶編號); // 過濾掉空白行
                    updateDashboard(globalClientData);
                    initDropdown(globalClientData);
                }
            });
        }

        // 初始化下拉選單
        function initDropdown(data) {
            const select = document.getElementById('client-select');
            select.innerHTML = '<option value="">-- 請選擇客戶編號 --</option>';
            data.forEach(row => {
                select.innerHTML += `<option value="${row.客戶編號}">${row.客戶編號}</option>`;
            });

            // 監聽下拉選單變化
            select.addEventListener('change', function(e) {
                const clientId = e.target.value;
                if (clientId) {
                    const clientData = data.find(r => r.客戶編號 === clientId);
                    updateIndividualChart(clientData);
                    updateClientCard(clientData);
                } else {
                    // 如果選擇空白，清空圖表和卡片
                    if (individualChartInstance) individualChartInstance.destroy();
                    document.getElementById('client-info-card').classList.add('hidden');
                }
            });
        }

        // 更新左側的客戶小卡資訊
        function updateClientCard(row) {
            const card = document.getElementById('client-info-card');
            const statusColor = row.狀態 === '紅燈' ? 'text-red-600' : (row.狀態 === '黃燈' ? 'text-yellow-600' : 'text-green-600');
            
            document.getElementById('card-status').innerHTML = `<span class="${statusColor}">${row.狀態}</span>`;
            document.getElementById('card-assets').innerText = row.資產規模;
            document.getElementById('card-expert').innerText = row.對接專家;
            card.classList.remove('hidden');
        }

        // 繪製或更新單一客戶圓餅圖
        function updateIndividualChart(row) {
            const labels = ['股票', '房地產', '房租', '保險', '共同基金', '債券', '黃金', '現金', '私募基金'];
            // 讀取資料，如果是空白就當作 0
            const dataValues = labels.map(label => parseFloat(row[label]) || 0);
            const ctx = document.getElementById('individualAssetChart').getContext('2d');

            // 如果原本有圖表，先銷毀它，再畫新的
            if (individualChartInstance) {
                individualChartInstance.destroy();
            }

            individualChartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: [
                            '#3b82f6', '#1e293b', '#64748b', '#b89150', '#8b5cf6',
                            '#10b981', '#fbbf24', '#cbd5e1', '#ef4444'
                        ],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right' },
                        tooltip: {
                            callbacks: {
                                // 讓滑鼠移過去時，自動計算並顯示百分比
                                label: function(context) {
                                    let value = context.raw || 0;
                                    let total = context.chart._metasets[context.datasetIndex].total;
                                    let percentage = total > 0 ? Math.round((value / total) * 100) : 0;
                                    return ` ${context.label}: ${value} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // 更新下方列表與 KPI (維持原本功能)
        function updateDashboard(data) {
            let redCount = 0, yellowCount = 0, greenCount = 0;
            const tableBody = document.getElementById('client-table-body');
            tableBody.innerHTML = '';

            data.forEach(row => {
                if (row.狀態 === '紅燈') redCount++;
                if (row.狀態 === '黃燈') yellowCount++;
                if (row.狀態 === '綠燈') greenCount++;

                const statusColor = row.狀態 === '紅燈' ? 'red' : (row.狀態 === '黃燈' ? 'yellow' : 'green');
                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition">
                        <td class="p-4 font-medium">${row.客戶編號}</td>
                        <td class="p-4">${row.資產規模}</td>
                        <td class="p-4"><span class="bg-${statusColor}-100 text-${statusColor}-700 px-2 py-1 rounded text-xs font-bold">● ${row.狀態}</span></td>
                        <td class="p-4 text-sm">${row.風險提醒}</td>
                        <td class="p-4 text-sm">${row.對接專家}</td>
                    </tr>
                `;
            });

            document.getElementById('kpi-container').innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-green-500">綠燈：<span class="text-2xl font-bold">${greenCount}</span> 戶</div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">黃燈：<span class="text-2xl font-bold">${yellowCount}</span> 戶</div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-red-500">紅燈：<span class="text-2xl font-bold">${redCount}</span> 戶</div>
            `;
            document.getElementById('update-time').innerText = '最後更新時間：' + new Date().toLocaleString();
        }

        loadData();
    </script>
</body>
</html>
