<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永旭全球 - 資產管理動態儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f4f4f2; font-family: "Microsoft JhengHei", sans-serif; color: #5b5b5b; }
        .gold-border { border-top: 4px solid #bda391; }
        
        /* 飽和度燈號樣式 */
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .dot-green { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; } /* 飽和綠 */
        .dot-yellow { background-color: #eab308; box-shadow: 0 0 8px #eab308; } /* 飽和黃 */
        .dot-red { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }    /* 飽和紅 */
        
        .section-title {
            background-color: #e6e2d6;
            padding: 10px 20px;
            font-weight: bold;
            color: #4a4a4a;
            border-radius: 8px 8px 0 0;
            margin-top: 20px;
        }
        
        tr.cursor-pointer:hover { background-color: #efede4; }
        .detail-row { display: none; background-color: #fafaf9; }
        .hnw-tag {
            background-color: #4a4a4a;
            color: #d9c8b0;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-xl shadow-sm gold-border">
            <div>
                <h1 class="text-2xl font-bold text-[#4a4a4a]">永旭全球 (Yongxu Global) </h1>
                <p id="update-time" class="text-slate-400 text-sm">數據載入中...</p>
            </div>
            <div class="text-right">
                <span class="text-xs border border-[#bda391] text-[#bda391] px-2 py-1 rounded">家族辦公室管理系統</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center" id="kpi-container"></div>

        <div class="section-title flex justify-between">
            <span>📈 成長型客戶區域 (資產規模 3000 萬以下)</span>
            <span id="growth-count" class="text-sm"></span>
        </div>
        <div class="bg-white rounded-b-xl shadow-sm overflow-hidden mb-10">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#f2f0e9] text-[#6b6b6b] text-sm">
                    <tr>
                        <th class="p-4 w-1/5">客戶編號</th>
                        <th class="p-4 w-1/5">總資產規模</th>
                        <th class="p-4 w-1/5">目前狀態</th>
                        <th class="p-4 w-1/5">對接專家</th>
                        <th class="p-4">風險提醒</th>
                    </tr>
                </thead>
                <tbody id="growth-table-body"></tbody>
            </table>
        </div>

        <div class="section-title flex justify-between" style="background-color: #d9c8b0;">
            <span>💎 高淨值客戶區域 (資產規模 3000 萬以上)</span>
            <span id="hnw-count" class="text-sm"></span>
        </div>
        <div class="bg-white rounded-b-xl shadow-sm overflow-hidden mb-10 border-2 border-[#d9c8b0]">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#d9c8b0] text-[#4a4a4a] text-sm">
                    <tr>
                        <th class="p-4 w-1/5">客戶編號</th>
                        <th class="p-4 w-1/5">總資產規模</th>
                        <th class="p-4 w-1/5">目前狀態</th>
                        <th class="p-4 w-1/5">對接專家</th>
                        <th class="p-4">風險提醒</th>
                    </tr>
                </thead>
                <tbody id="hnw-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 【請在此處替換成你的 Google 試算表 CSV 網址】
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTV5NXcQxG8T3pFWlP-Dl6MUbSQT4Y5ILfsw3jMii0EmIKYdx73XkniDLss6_vVji5j8vcwhO3vYW05/pub?output=csv';

        Chart.register(ChartDataLabels);

        const morandiColors = ['#9fb8ad', '#c5d7c0', '#e6e2d6', '#e4dece', '#d9c8b0', '#bda391', '#949a94', '#7a847a', '#847e72', '#a5a5a5'];

        function loadData() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const cleanData = results.data.filter(row => row.客戶編號);
                    updateDashboard(cleanData);
                }
            });
        }

        function updateDashboard(data) {
            let redCount = 0, yellowCount = 0, greenCount = 0;
            const growthTable = document.getElementById('growth-table-body');
            const hnwTable = document.getElementById('hnw-table-body');
            
            growthTable.innerHTML = '';
            hnwTable.innerHTML = '';

            let hnwList = [];
            let growthList = [];

            data.forEach((row, index) => {
                // 燈號計數
                if (row.狀態 === '紅燈') redCount++;
                if (row.狀態 === '黃燈') yellowCount++;
                if (row.狀態 === '綠燈') greenCount++;

                // 判斷是否為高淨值 (大於 3000 萬)
                const assetValue = parseFloat(row.資產規模.replace(/,/g, '')) || 0;
                
                const statusColorClass = row.狀態 === '紅燈' ? 'text-red-600' : (row.狀態 === '黃燈' ? 'text-yellow-600' : 'text-green-600');
                const dotClass = row.狀態 === '紅燈' ? 'dot-red' : (row.狀態 === '黃燈' ? 'dot-yellow' : 'dot-green');

                const rowHtml = `
                    <tr class="border-b cursor-pointer transition" onclick="toggleDetail(${index})">
                        <td class="p-4 font-bold text-[#bda391]"><u>${row.客戶編號}</u>${assetValue > 3000 ? '<span class="hnw-tag">HNW</span>' : ''}</td>
                        <td class="p-4 font-medium">${row.資產規模} 萬元</td>
                        <td class="p-4"><span class="status-dot ${dotClass}"></span><span class="${statusColorClass} font-bold">${row.狀態}</span></td>
                        <td class="p-4">${row.對接專家}</td>
                        <td class="p-4 text-sm text-slate-400">${row.風險提醒}</td>
                    </tr>
                    <tr id="detail-${index}" class="detail-row border-b">
                        <td colspan="5" class="p-8">
                            <div class="flex flex-col lg:flex-row gap-8 items-start">
                                <div class="w-full lg:w-1/3">
                                    <h4 class="font-bold mb-4 text-[#7a847a] border-b pb-2">資產明細 (單位: 萬元)</h4>
                                    <table class="w-full text-sm">${renderAssetList(row)}</table>
                                </div>
                                <div class="w-full lg:w-2/3 h-80 bg-white rounded-lg p-4 shadow-inner">
                                    <canvas id="chart-${index}"></canvas>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;

                if (assetValue > 3000) {
                    hnwTable.innerHTML += rowHtml;
                    hnwList.push(row);
                } else {
                    growthTable.innerHTML += rowHtml;
                    growthList.push(row);
                }
            });

            // 更新數量顯示
            document.getElementById('growth-count').innerText = `共 ${growthList.length} 戶`;
            document.getElementById('hnw-count').innerText = `共 ${hnwList.length} 戶`;

            // 更新 KPI
            document.getElementById('kpi-container').innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-green-500">
                    <span class="status-dot dot-green"></span>健康綠燈：<span class="text-2xl font-bold text-green-600">${greenCount}</span> 戶
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    <span class="status-dot dot-yellow"></span>關注黃燈：<span class="text-2xl font-bold text-yellow-600">${yellowCount}</span> 戶
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-red-500">
                    <span class="status-dot dot-red"></span>預警紅燈：<span class="text-2xl font-bold text-red-600">${redCount}</span> 戶
                </div>
            `;
            document.getElementById('update-time').innerText = '最後更新：' + new Date().toLocaleString();
            window.clientData = data;
        }

        function renderAssetList(row) {
            const labels = ['股票', '房地產', '壽險', '共同基金', '債券', '黃金', '現金', '私募基金'];
            return labels.map(label => {
                const val = row[label] || '0';
                return `<tr class="border-b"><td class="py-2 text-slate-500">${label}</td><td class="py-2 text-right font-medium">${val} 萬元</td></tr>`;
            }).join('');
        }

        function toggleDetail(index) {
            const detailRow = document.getElementById(`detail-${index}`);
            const isVisible = detailRow.style.display === 'table-row';
            document.querySelectorAll('.detail-row').forEach(row => row.style.display = 'none');
            if (!isVisible) {
                detailRow.style.display = 'table-row';
                renderChart(index, window.clientData[index]);
            }
        }

        function renderChart(index, row) {
            const labels = ['股票', '房地產', '壽險', '共同基金', '債券', '黃金', '現金', '私募基金'];
            const dataValues = labels.map(l => parseFloat(row[l]) || 0);
            const ctx = document.getElementById(`chart-${index}`).getContext('2d');
            if (window[`chartObj-${index}`]) window[`chartObj-${index}`].destroy();

            window[`chartObj-${index}`] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: morandiColors,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: 40 },
                    plugins: {
                        legend: { position: 'right', labels: { color: '#7a847a', font: { size: 12 } } },
                        datalabels: {
                            color: '#5b5b5b',
                            font: { weight: 'bold', size: 12 },
                            formatter: (value, ctx) => {
                                let sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                if (value === 0) return null;
                                let percentage = (value * 100 / sum).toFixed(1) + "%";
                                return ctx.chart.data.labels[ctx.dataIndex] + "\n" + percentage;
                            },
                            anchor: 'end',
                            align: 'start',
                            offset: 15
                        }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
