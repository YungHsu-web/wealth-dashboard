<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永續全球 - 動態管理儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: "Microsoft JhengHei", sans-serif; }
        .gold-border { border-top: 4px solid #b89150; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-xl shadow-md gold-border">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">永續全球 (Yongxu Global) 動態管理</h1>
                <p id="update-time" class="text-slate-500 text-sm">數據讀取中...</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center" id="kpi-container">
            </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4">客戶編號</th>
                        <th class="p-4">資產規模</th>
                        <th class="p-4">狀態</th>
                        <th class="p-4">風險提醒</th>
                        <th class="p-4">對接專家</th>
                    </tr>
                </thead>
                <tbody id="client-table-body" class="text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 【請在此處替換成你剛剛在 Google 試算表取得的 CSV 網址】
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTV5NXcQxG8T3pFWlP-Dl6MUbSQT4Y5ILfsw3jMii0EmIKYdx73XkniDLss6_vVji5j8vcwhO3vYW05/pubhtml';

        function loadData() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const data = results.data;
                    updateDashboard(data);
                }
            });
        }

        function updateDashboard(data) {
            let redCount = 0, yellowCount = 0, greenCount = 0;
            const tableBody = document.getElementById('client-table-body');
            tableBody.innerHTML = '';

            data.forEach(row => {
                if(!row.客戶編號) return; // 跳過空行

                // 計算狀態人數
                if(row.狀態 === '紅燈') redCount++;
                if(row.狀態 === '黃燈') yellowCount++;
                if(row.狀態 === '綠燈') greenCount++;

                // 產出表格列
                const statusColor = row.狀態 === '紅燈' ? 'red' : (row.狀態 === '黃燈' ? 'yellow' : 'green');
                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-4">${row.客戶編號}</td>
                        <td class="p-4">${row.資產規模}</td>
                        <td class="p-4"><span class="bg-${statusColor}-100 text-${statusColor}-700 px-2 py-1 rounded text-xs">● ${row.狀態}</span></td>
                        <td class="p-4 text-sm">${row.風險提醒}</td>
                        <td class="p-4 text-sm">${row.對接專家}</td>
                    </tr>
                `;
            });

            // 更新 KPI
            document.getElementById('kpi-container').innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-green-500">綠燈：${greenCount}</div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">黃燈：${yellowCount}</div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-red-500">紅燈：${redCount}</div>
            `;
            document.getElementById('update-time').innerText = '最後更新時間：' + new Date().toLocaleString();
        }

        loadData(); // 啟動讀取
    </script>
</body>
</html>
